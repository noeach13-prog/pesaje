<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesaje - Acceso</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333;
       display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 12px; padding: 32px 24px; width: 100%; max-width: 380px;
              box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin: 16px; }
h1 { font-size: 1.5rem; text-align: center; margin-bottom: 4px; }
.subtitle { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 24px; }
label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; color: #555; }
select, input[type="text"] {
    width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 16px; margin-bottom: 16px; background: #fff;
}
input[type="text"] { text-align: center; letter-spacing: 8px; font-size: 24px; font-weight: 700; }
.btn-primary {
    width: 100%; padding: 14px; background: #1565c0; color: #fff; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
}
.btn-primary:hover { background: #0d47a1; }
.error { background: #fce4ec; color: #c62828; padding: 10px; border-radius: 6px;
         text-align: center; font-size: 0.85rem; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="login-card">
    <h1>Pesaje v3</h1>
    <p class="subtitle">Ingresa el codigo de tu sucursal</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/entrada/login">
        <label>Sucursal</label>
        <select name="sucursal_id" required>
            <option value="">Seleccionar...</option>
            {% for s in sucursales %}
            <option value="{{ s.id }}">{{ s.nombre }}</option>
            {% endfor %}
        </select>

        <label>Codigo de acceso</label>
        <input type="text" name="pin" maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="----" required autocomplete="off">

        <button type="submit" class="btn-primary">Entrar</button>
    </form>
</div>
</body>
</html>
