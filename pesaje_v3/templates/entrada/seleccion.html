<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ sucursal.nombre }} - Seleccionar turno</title>
<style>
:root {
    --bg: #f5f0ea;
    --card: #fff;
    --ink: #2c2117;
    --muted: #8a7868;
    --accent: #8b5e34;
    --accent-hover: #6d4828;
    --accent-soft: #f3e8db;
    --line: #e4ddd5;
    --focus: rgba(139,94,52,0.15);
    --success: #2e7d32;
    --warning: #e65100;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px;
}
.header {
    background: var(--ink);
    color: #fff;
    padding: 16px 20px;
    border-radius: 14px;
    max-width: 500px;
    margin: 0 auto 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header h1 { font-size: 1.1rem; }
.header .sub { font-size: 0.75rem; opacity: 0.6; }
.header a { color: #fff; opacity: 0.7; font-size: 0.75rem; text-decoration: none; }
.header a:hover { opacity: 1; }

.card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    max-width: 500px;
    margin: 0 auto 12px;
    padding: 24px;
}
.card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
}

/* Form fields */
.field { margin-bottom: 16px; }
.field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
}
.field input[type="date"] {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-size: 15px;
    color: var(--ink);
    background: #faf8f5;
    -webkit-appearance: none;
}
.field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus);
}

/* Turno buttons */
.turno-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}
.turno-btn {
    padding: 14px 8px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.15s;
    background: #faf8f5;
}
.turno-btn:hover { border-color: var(--accent); }
.turno-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}
.turno-btn.exists {
    border-color: var(--success);
    position: relative;
}
.turno-btn.exists::after {
    content: 'Ya cargado';
    display: block;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--success);
    margin-top: 2px;
}
.turno-btn.active.exists::after { color: rgba(255,255,255,0.8); }

/* Warning */
.warn { display: none; background: #fff8ed; border: 1px solid #f0d4a8; padding: 10px 12px; border-radius: 10px; font-size: 0.82rem; color: var(--warning); margin-bottom: 12px; }

/* Buttons */
.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.links {
    max-width: 500px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
}
.links a {
    flex: 1;
    padding: 12px;
    background: var(--card);
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.links a:hover { background: var(--accent-soft); }
</style>
</head>
<body>
<div class="header">
    <div>
        <h1>{{ sucursal.nombre }}</h1>
        <div class="sub">Seleccionar turno para cargar</div>
    </div>
    <a href="/entrada/">Salir</a>
</div>

<div class="card">
    <div class="card-title">Nuevo turno</div>
    <form method="POST" action="/entrada/seleccion">
        <input type="hidden" name="tipo_turno" id="tipoTurno" value="{{ prox_tipo or 'DIA' }}">

        <div class="field">
            <label for="fecha">Fecha</label>
            <input type="date" name="fecha" id="fecha" value="{{ prox_fecha or hoy }}" required onchange="checkFecha()">
        </div>

        <div class="field">
            <label>Tipo de turno</label>
            <div class="turno-btns" id="turnoBtns">
                <div class="turno-btn{{ ' active' if prox_tipo == 'DIA' else '' }}" data-val="DIA" onclick="selTurno(this)">DIA</div>
                <div class="turno-btn{{ ' active' if prox_tipo == 'NOCHE' else '' }}" data-val="NOCHE" onclick="selTurno(this)">NOCHE</div>
                <div class="turno-btn{{ ' active' if prox_tipo == 'UNICO' else '' }}" data-val="UNICO" onclick="selTurno(this)">UNICO</div>
            </div>
        </div>

        <div class="warn" id="warnBox"></div>
        <button type="submit" class="btn btn-primary" id="btnCrear">Crear turno</button>
    </form>
</div>

<div class="links">
    <a href="/entrada/historial">Historial</a>
    <a href="/entrada/">Cambiar sucursal</a>
</div>

<script>
const EXISTENTES = {{ turnos_existentes | tojson }};
const MODO = "{{ modo }}";

function selTurno(el) {
    document.querySelectorAll('.turno-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('exists'); });
    el.classList.add('active');
    document.getElementById('tipoTurno').value = el.dataset.val;
    checkFecha();
}

function checkFecha() {
    const fecha = document.getElementById('fecha').value;
    const tipo = document.getElementById('tipoTurno').value;
    const warn = document.getElementById('warnBox');
    const btn = document.getElementById('btnCrear');

    warn.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Crear turno';

    if (!fecha || !tipo) return;

    document.querySelectorAll('.turno-btn').forEach(b => {
        b.classList.remove('exists');
        const ex = EXISTENTES.find(e => e.fecha === fecha && e.tipo === b.dataset.val);
        if (ex) {
            b.classList.add('exists');
            if (b.dataset.val === tipo) {
                btn.textContent = 'Abrir turno existente';
            }
        }
    });
}

checkFecha();
</script>
</body>
</html>
